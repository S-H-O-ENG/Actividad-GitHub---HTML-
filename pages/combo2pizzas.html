<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../css/pedidos_pizza_limonada.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="cuadro">
        <div class="imagencentro">
            <img src="../img/P2.webp" alt="pizza-Gaseosa">
        </div>       
        <br>
        <div class="linea1y2">
        <h1>Combo Pizza Pizza Doble</h1>
        <h2>Ingredientes:(Champiñones, Queso, Carne de res, Cebolla, Pimientos)</h2>
        <br><br><br>
        </div>
        <div class="cantidad">
            <span>Cantidad</span>
            <input type="number" value="1" min="1" onkeydown="return false">
        </div>
        <br>
        <div class="tamaño">
            <span>Tamaño</span>
            <input type="radio" id="S" name="tamañopizza">

            <input type="radio" id="M" name="tamañopizza">
            <label for="M">M</label>
            <input type="radio" id="L" name="tamañopizza">
            <label for="L">L</label>
        </div> <br> <br>
        <div class="extras">    
            <h2>Extras</h2>
            <div class="ingredientes">
                <img src="../img/P2.webp" alt="">
                <span>Pizza Extra</span>
                <input type="number" value="0" min="0" onkeydown="return false">      
        </div> <br>
        <h2>Precio:</h2>   
        <div class="Confirmar"> <br><br>
            <a href="../Index.html"><h2>Confirmar Orden</h2></a>  
        </div>  
    </div>
